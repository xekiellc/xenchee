<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — Voxxee</title>

  <meta property="og:title" content="Search — Voxxee" />
  <meta property="og:description" content="Search users, posts, and communities on Voxxee — the free speech maximalist social platform for verified adults." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://voxxee.com/search.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Search — Voxxee" />
  <meta name="twitter:description" content="Search users, posts, and communities on Voxxee — the free speech maximalist social platform for verified adults." />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voxxee" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FSCZJEWZ6F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FSCZJEWZ6F');
  </script>

  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .search-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: calc(var(--nav-height) + 24px) 16px 40px;
    }
    .search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .search-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .search-tab { font-size: 13px; padding: 6px 16px; border-radius: var(--radius-full); }
    .search-empty { text-align: center; color: var(--text-muted); font-size: 15px; padding: 48px 0; }
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(8,8,10,0.97);
      border-top: 1px solid var(--border);
      z-index: 1000;
      backdrop-filter: blur(12px);
    }
    .mobile-nav-inner { display: flex; align-items: center; justify-content: space-around; height: 100%; }
    .mobile-nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 6px 12px; text-decoration: none;
      color: #6a6a7a; font-size: 10px; font-weight: 600;
    }
    .mobile-nav-item.active { color: var(--primary); }
    .mobile-nav-item span { font-size: 20px; line-height: 1; }

    @media (max-width: 768px) {
      .mobile-nav { display: block; }
      .search-wrap { padding-bottom: 80px; }
      .search-bar input { font-size: 15px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/feed.html" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/feed.html" class="btn btn-ghost">Feed</a>
      <a href="/stories.html" class="btn btn-ghost">📸 Stories</a>
      <a href="/profile.html" class="btn btn-ghost">Profile</a>
      <button id="logout-btn" class="btn btn-ghost">Log Out</button>
    </div>
  </nav>

  <div class="search-wrap">

    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        class="form-input"
        placeholder="Search users, posts, communities..."
        maxlength="100"
        autocomplete="off"
        style="flex:1;font-size:15px;"
      />
      <button id="search-btn" class="btn btn-primary">Search</button>
    </div>

    <div class="search-tabs">
      <button class="btn btn-primary search-tab" data-tab="users">👤 Users</button>
      <button class="btn btn-ghost search-tab" data-tab="posts">📝 Posts</button>
      <button class="btn btn-ghost search-tab" data-tab="communities">💬 Communities</button>
    </div>

    <div id="search-results">
      <div class="search-empty">Search for users, posts, or communities.</div>
    </div>

  </div>

  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="/feed.html" class="mobile-nav-item"><span>🏠</span>Home</a>
      <a href="/search.html" class="mobile-nav-item active"><span>🔍</span>Search</a>
      <a href="/communities.html" class="mobile-nav-item"><span>💬</span>Communities</a>
      <a href="/notifications.html" class="mobile-nav-item"><span>🔔</span>Alerts</a>
      <a href="/profile.html" class="mobile-nav-item"><span>👤</span>Profile</a>
    </div>
  </nav>

  <script src="/js/supabase.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
