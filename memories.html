    <div class="sidebar-left">
      <ul class="sidebar-nav">
        <li><a href="/feed.html"><span class="sidebar-nav-icon">🏠</span>Home</a></li>
        <li><a href="/search.html"><span class="sidebar-nav-icon">🔍</span>Search</a></li>

      </ul>

    <div class="feed-main">

      <!-- Header -->
      <div style="margin-bottom:24px;">
        <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px;">🕰️ Memories</div>
        <div style="font-size:15px;color:var(--text-muted);">Look back on what you posted on this day in previous years.</div>
      </div>

      <!-- Date Filter -->
      <div class="post-card" style="margin-bottom:24px;">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <div style="flex:1;">
            <label class="form-label" style="margin-bottom:6px;display:block;">Browse a specific date</label>
            <input type="date" id="memory-date" class="form-input" style="max-width:220px;" />
          </div>
          <button id="browse-btn" class="btn btn-primary" style="align-self:flex-end;">Browse</button>
          <button id="today-btn" class="btn btn-ghost" style="align-self:flex-end;">Today</button>
        </div>
      </div>

      <!-- On This Day Header -->
      <div id="memory-date-label" style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;"></div>

      <!-- Memories Feed -->
      <div id="memories-container">
        <div class="loading"><div class="spinner"></div>Loading memories...</div>
      </div>

    </div>

    <div class="sidebar-right">
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;">
        On This Day
      </div>
      <div id="memory-years-sidebar" style="font-size:14px;color:var(--text-muted);">Loading...</div>
