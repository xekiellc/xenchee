<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Voxxee — Sign Up</title>

  <meta property="og:title" content="Join Voxxee — Sign Up" />
  <meta property="og:description" content="Create your free Voxxee account. Free speech maximalist social platform for verified adults. No shadowbans. No censorship." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://voxxee.com/signup.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Join Voxxee — Sign Up" />
  <meta name="twitter:description" content="Create your free Voxxee account. Free speech maximalist social platform for verified adults. No shadowbans. No censorship." />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voxxee" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FSCZJEWZ6F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FSCZJEWZ6F');
  </script>

  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      padding-top: calc(var(--nav-height) + 32px);
      padding-bottom: 40px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 36px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .form-hint { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .terms-label {
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer; font-size: 13px; color: var(--text-muted); line-height: 1.5;
    }
    .terms-label input { margin-top: 2px; accent-color: var(--primary); flex-shrink: 0; }
    .terms-label a { color: var(--primary); }
    .recaptcha-wrap { transform-origin: left top; }
    .password-wrap { position: relative; }
    .password-wrap .form-input { padding-right: 44px; width: 100%; box-sizing: border-box; }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6a6a7a;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s ease;
    }
    .password-toggle:hover { color: var(--text); }

    @media (max-width: 480px) {
      .auth-card { padding: 24px 20px; border-radius: var(--radius-lg); }
      .auth-title { font-size: 1.5rem; }
      .recaptcha-wrap { transform: scale(0.88); }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/login.html" class="btn btn-ghost">Log In</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">Join Voxxee</div>
      <div class="auth-subtitle">Free speech. Verified adults. No shadowbans.</div>

      <div id="alert-container"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="yourhandle" maxlength="30" autocomplete="username" />
        <div class="form-hint">Letters, numbers, underscores only</div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="form-input" placeholder="Minimum 8 characters" autocomplete="new-password" />
          <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Date of Birth</label>
        <input type="date" id="dob" class="form-input" />
        <div class="form-hint">You must be 18 or older to join Voxxee</div>
      </div>

      <div class="form-group">
        <label class="terms-label">
          <input type="checkbox" id="terms" />
          <span>I am 18 or older and agree to the
            <a href="/terms.html">Terms of Service</a> and
            <a href="/privacy.html">Privacy Policy</a>
          </span>
        </label>
      </div>

      <div class="form-group">
        <div class="recaptcha-wrap">
          <div id="recaptcha-container" class="g-recaptcha" data-sitekey="6LeOqfQsAAAAAF1mZktRAvH850-95HxEzpfVoTZA"></div>
        </div>
      </div>

      <button id="signup-btn" class="btn btn-primary btn-block" style="justify-content:center;padding:11px;">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
