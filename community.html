<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community — XenChee</title>
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="nav">
    <a href="/feed.html" class="nav-brand">XenChee</a>
    <div class="nav-actions">
      <a href="/feed.html" class="btn btn-ghost">Feed</a>
      <a href="/profile.html" class="btn btn-ghost">Profile</a>
      <button class="btn btn-ghost" id="logout-btn">Log Out</button>
    </div>
  </nav>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <div class="sidebar-left">
      <ul class="sidebar-nav">
        <li><a href="/feed.html"><span class="sidebar-nav-icon">🏠</span>Home</a></li>
        <li><a href="/search.html"><span class="sidebar-nav-icon">🔍</span>Search</a></li>
        <li><a href="/communities.html" class="active"><span class="sidebar-nav-icon">💬</span>Communities</a></li>
        <li><a href="/events.html"><span class="sidebar-nav-icon">📅</span>Events</a></li>
        <li><a href="/messages.html"><span class="sidebar-nav-icon">✉️</span>Messages</a></li>
        <li><a href="/notifications.html"><span class="sidebar-nav-icon">🔔</span>Notifications</a></li>
        <li><a href="/memories.html"><span class="sidebar-nav-icon">🕰️</span>Memories</a></li>
        <li><a href="/games.html"><span class="sidebar-nav-icon">🎮</span>Games</a></li>
        <li><a href="/profile.html"><span class="sidebar-nav-icon">👤</span>Profile</a></li>
        <li><a href="/ecosystem.html"><span class="sidebar-nav-icon">🌐</span>Ecosystem</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="feed-main">

      <!-- Community Header -->
      <div id="community-header" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;">
        <div style="height:120px;background:linear-gradient(135deg,var(--primary),#a78bfa);position:relative;">
          <!-- Banner gradient stays, logo overlaps bottom -->
        </div>
        <div style="padding:0 24px 24px;">
          <!-- Logo + Name row -->
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:-32px;margin-bottom:12px;flex-wrap:wrap;gap:12px;">
            <div style="display:flex;align-items:flex-end;gap:16px;">
              <!-- Logo avatar -->
              <div id="community-logo"
                style="width:64px;height:64px;border-radius:12px;background:var(--primary);border:3px solid var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;">
              </div>
              <div style="padding-bottom:4px;">
                <div id="community-name" style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:2px;">Loading...</div>
                <div id="community-slug" style="font-size:13px;color:var(--text-muted);"></div>
              </div>
            </div>
            <button id="join-btn" class="btn btn-primary" style="display:none;">Join Community</button>
          </div>

          <div id="community-description" style="font-size:15px;color:var(--text-secondary);line-height:1.6;margin-bottom:16px;"></div>

          <div style="display:flex;gap:24px;flex-wrap:wrap;">
            <div style="font-size:14px;color:var(--text-secondary);">
              <span id="community-member-count" style="font-weight:700;color:var(--text);">0</span> Members
            </div>
            <div style="font-size:14px;color:var(--text-secondary);">
              <span id="community-post-count" style="font-weight:700;color:var(--text);">0</span> Posts
            </div>
          </div>
        </div>
      </div>

      <!-- Create Post in Community -->
      <div class="create-post" style="margin-bottom:20px;">
        <div class="create-post-header">
          <div class="post-avatar" id="user-avatar">?</div>
          <textarea class="create-post-input" id="post-content" placeholder="Post in this community..." maxlength="2000"></textarea>
        </div>
        <div class="create-post-footer">
          <div></div>
          <button class="btn btn-primary" id="post-btn">Post</button>
        </div>
      </div>

      <!-- Community Posts -->
      <div id="community-posts">
        <div class="loading"><div class="spinner"></div>Loading posts...</div>
      </div>

    </div>

    <!-- Right Sidebar -->
    <div class="sidebar-right">
      <div id="community-rules-sidebar"></div>
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-top:24px;margin-bottom:16px;">Other Communities</div>
      <div id="other-communities"></div>
    </div>

  </div>

  <script src="js/supabase.js"></script>
  <script src="js/community.js"></script>
</body>
</html>
