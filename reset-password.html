<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Voxxee</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voxxee" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FSCZJEWZ6F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FSCZJEWZ6F');
  </script>

  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-top: calc(var(--nav-height) + 32px);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 36px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--text-dim); padding: 0;
    }
    .success-state {
      text-align: center;
      padding: 20px 0;
    }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    .success-msg { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    @media (max-width: 480px) {
      .auth-card { padding: 24px 20px; border-radius: var(--radius-lg); }
      .auth-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/login.html" class="btn btn-ghost">Log In</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Step 1: Request reset email -->
      <div id="request-step">
        <div class="auth-title">Reset Password</div>
        <div class="auth-subtitle">Enter your email and we'll send you a reset link.</div>

        <div id="alert-container"></div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="reset-email" class="form-input" placeholder="you@example.com" autocomplete="email" />
        </div>

        <button id="send-reset-btn" class="btn btn-primary btn-block" style="justify-content:center;padding:11px;">
          Send Reset Link
        </button>

        <div class="auth-footer">
          <a href="/login.html">← Back to Log In</a>
        </div>
      </div>

      <!-- Step 2: Success message -->
      <div id="success-step" style="display:none;">
        <div class="success-state">
          <div class="success-icon">📧</div>
          <div class="success-title">Check your email</div>
          <div class="success-msg">
            We sent a password reset link to your email address. Click the link in the email to set a new password.
          </div>
          <div style="margin-top:24px;">
            <a href="/login.html" class="btn btn-ghost">← Back to Log In</a>
          </div>
        </div>
      </div>

      <!-- Step 3: Set new password (shown when user arrives via reset link) -->
      <div id="new-password-step" style="display:none;">
        <div class="auth-title">Set New Password</div>
        <div class="auth-subtitle">Choose a strong password for your account.</div>

        <div id="new-password-alert"></div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="password-wrap">
            <input type="password" id="new-password" class="form-input" placeholder="New password" style="padding-right:48px;" autocomplete="new-password" />
            <button id="new-password-toggle" type="button" class="password-toggle">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="confirm-password" class="form-input" placeholder="Confirm new password" style="padding-right:48px;" autocomplete="new-password" />
            <button id="confirm-password-toggle" type="button" class="password-toggle">👁️</button>
          </div>
        </div>

        <button id="update-password-btn" class="btn btn-primary btn-block" style="justify-content:center;padding:11px;">
          Update Password
        </button>
      </div>

    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    async function waitForDb(timeout = 5000) {
      const start = Date.now();
      while (!window.db) {
        if (Date.now() - start > timeout) throw new Error('Supabase init timeout');
        await new Promise(r => setTimeout(r, 50));
      }
    }

    function showAlert(containerId, message, type = 'error') {
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = `
        <div style="padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:500;
          background:${type === 'error' ? 'rgba(244,63,94,0.1)' : 'rgba(0,229,255,0.1)'};
          border:1px solid ${type === 'error' ? 'rgba(244,63,94,0.3)' : 'rgba(0,229,255,0.3)'};
          color:${type === 'error' ? '#f43f5e' : 'var(--primary)'};">
          ${message}
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await waitForDb();

      // Check if we're in password recovery mode (user clicked email link)
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
      const type = hashParams.get('type');

      if (type === 'recovery') {
        document.getElementById('request-step').style.display = 'none';
        document.getElementById('new-password-step').style.display = 'block';
      }

      // Also handle via onAuthStateChange
      window.db.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') {
          document.getElementById('request-step').style.display = 'none';
          document.getElementById('success-step').style.display = 'none';
          document.getElementById('new-password-step').style.display = 'block';
        }
      });

      // Send reset email
      const sendBtn = document.getElementById('send-reset-btn');
      sendBtn.addEventListener('click', async () => {
        const email = document.getElementById('reset-email').value.trim();
        if (!email) {
          showAlert('alert-container', 'Please enter your email address.');
          return;
        }

        sendBtn.textContent = 'Sending...';
        sendBtn.disabled = true;

        const { error } = await window.db.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://voxxee.com/reset-password.html'
        });

        if (error) {
          showAlert('alert-container', error.message);
          sendBtn.textContent = 'Send Reset Link';
          sendBtn.disabled = false;
        } else {
          document.getElementById('request-step').style.display = 'none';
          document.getElementById('success-step').style.display = 'block';
        }
      });

      // Handle Enter key on email field
      document.getElementById('reset-email').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendBtn.click();
      });

      // Toggle password visibility
      document.getElementById('new-password-toggle').addEventListener('click', () => {
        const input = document.getElementById('new-password');
        input.type = input.type === 'password' ? 'text' : 'password';
      });
      document.getElementById('confirm-password-toggle').addEventListener('click', () => {
        const input = document.getElementById('confirm-password');
        input.type = input.type === 'password' ? 'text' : 'password';
      });

      // Update password
      document.getElementById('update-password-btn').addEventListener('click', async () => {
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!newPassword || newPassword.length < 8) {
          showAlert('new-password-alert', 'Password must be at least 8 characters.');
          return;
        }
        if (newPassword !== confirmPassword) {
          showAlert('new-password-alert', 'Passwords do not match.');
          return;
        }

        const btn = document.getElementById('update-password-btn');
        btn.textContent = 'Updating...';
        btn.disabled = true;

        const { error } = await window.db.auth.updateUser({ password: newPassword });

        if (error) {
          showAlert('new-password-alert', error.message);
          btn.textContent = 'Update Password';
          btn.disabled = false;
        } else {
          btn.textContent = 'Updated!';
          setTimeout(() => {
            window.location.href = '/feed.html';
          }, 1500);
        }
      });

      // Enter key on password fields
      document.getElementById('confirm-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('update-password-btn').click();
      });
    });
  </script>
</body>
</html>
