  <style>
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(8,8,10,0.97);
      border-top: 1px solid var(--border);
      z-index: 1000;
      backdrop-filter: blur(12px);
    }
    .mobile-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 100%;
      padding: 0 8px;
    }
    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 12px;
      text-decoration: none;
      color: #6a6a7a;
      font-size: 10px;
      font-weight: 600;
      transition: color 0.15s ease;
    }
    .mobile-nav-item.active { color: var(--primary); }
    .mobile-nav-item span { font-size: 20px; line-height: 1; }

    .notif-page-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: calc(var(--nav-height) + 24px) 16px 40px;
    }

    .notif-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .notif-page-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    @media (max-width: 768px) {
      .mobile-nav { display: block; }
      .notif-page-wrap { padding-bottom: 80px; }
    }
  </style>
</head>

  <nav class="nav">
    <a href="/feed.html" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/feed.html" class="btn btn-ghost">Feed</a>
      <a href="/profile.html" class="btn btn-ghost">Profile</a>
      <button id="logout-btn" class="btn btn-ghost">Log Out</button>
    </div>
  </nav>

  <div class="notif-page-wrap">
    <div class="notif-page-header">
      <div class="notif-page-title">Notifications</div>
      <button id="mark-all-read-btn" class="btn btn-ghost btn-sm">Mark all read</button>
    </div>
    <div id="notifications-container">
      <div class="loading"><div class="spinner"></div>Loading notifications...</div>
    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav">

      <a href="/communities.html" class="mobile-nav-item">
        <span>💬</span>Communities
      </a>
      <a href="/notifications.html" class="mobile-nav-item active">
        <span>🔔</span>Alerts
      </a>
      <a href="/profile.html" class="mobile-nav-item">
        <span>👤</span>Profile
      </a>
    </div>
  </nav>

  <script src="/js/supabase.js"></script>
  <script src="/js/notifications.js"></script>
