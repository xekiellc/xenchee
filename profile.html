<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — XenChee</title>
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="nav">
    <a href="/feed.html" class="nav-brand">XenChee</a>
    <div class="nav-actions">
      <a href="/feed.html" class="btn btn-ghost">Feed</a>
      <button class="btn btn-ghost" id="logout-btn">Log Out</button>
    </div>
  </nav>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <div class="sidebar-left">
      <ul class="sidebar-nav">
        <li><a href="/feed.html"><span class="sidebar-nav-icon">🏠</span>Home</a></li>
        <li><a href="/communities.html"><span class="sidebar-nav-icon">💬</span>Communities</a></li>
        <li><a href="/events.html"><span class="sidebar-nav-icon">📅</span>Events</a></li>
        <li><a href="/messages.html"><span class="sidebar-nav-icon">✉️</span>Messages</a></li>
        <li><a href="/notifications.html"><span class="sidebar-nav-icon">🔔</span>Notifications</a></li>
        <li><a href="/profile.html" class="active"><span class="sidebar-nav-icon">👤</span>Profile</a></li>
        <li><a href="/ecosystem.html"><span class="sidebar-nav-icon">🌐</span>Ecosystem</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="feed-main">

      <!-- Profile Header -->
      <div id="profile-header" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;">

        <!-- Banner -->
        <div style="height:160px;background:linear-gradient(135deg,var(--primary),#a78bfa);position:relative;">
          <div id="profile-avatar-large" style="position:absolute;bottom:-32px;left:24px;width:80px;height:80px;border-radius:50%;background:var(--bg-card);border:4px solid var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--primary);">?</div>
        </div>

        <!-- Profile Info -->
        <div style="padding:48px 24px 24px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
            <div>
              <div id="profile-display-name" style="font-size:22px;font-weight:800;margin-bottom:4px;">Loading...</div>
              <div id="profile-username" style="font-size:15px;color:var(--text-muted);">@...</div>
            </div>
            <button id="edit-profile-btn" class="btn btn-ghost" style="display:none;">Edit Profile</button>
          </div>

          <div id="profile-bio" style="margin-top:12px;font-size:15px;color:var(--text-secondary);line-height:1.6;"></div>

          <div style="display:flex;gap:24px;margin-top:16px;flex-wrap:wrap;">
            <div style="font-size:14px;color:var(--text-secondary);">
              <span id="profile-post-count" style="font-weight:700;color:var(--text);">0</span> Posts
            </div>
            <div style="font-size:14px;color:var(--text-secondary);">
              <span id="profile-follower-count" style="font-weight:700;color:var(--text);">0</span> Followers
            </div>
            <div style="font-size:14px;color:var(--text-secondary);">
              <span id="profile-following-count" style="font-weight:700;color:var(--text);">0</span> Following
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Profile Form (hidden by default) -->
      <div id="edit-profile-form" style="display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;">
        <div style="font-size:18px;font-weight:700;margin-bottom:20px;">Edit Profile</div>

        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input type="text" id="edit-display-name" class="form-input" placeholder="Your name" maxlength="50" />
        </div>

        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea id="edit-bio" class="form-input" placeholder="Tell people about yourself..." maxlength="160" style="resize:none;min-height:80px;"></textarea>
          <div class="form-hint">160 characters max</div>
        </div>

        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" id="edit-location" class="form-input" placeholder="Where are you?" maxlength="50" />
        </div>

        <div class="form-group">
          <label class="form-label">Website</label>
          <input type="url" id="edit-website" class="form-input" placeholder="https://yoursite.com" />
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;">
          <button id="save-profile-btn" class="btn btn-primary">Save Profile</button>
          <button id="cancel-edit-btn" class="btn btn-ghost">Cancel</button>
        </div>
      </div>

      <!-- Profile Posts -->
      <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text-secondary);">Posts</div>
      <div id="profile-posts">
        <div class="loading"><div class="spinner"></div>Loading posts...</div>
      </div>

    </div>

    <!-- Right Sidebar -->
    <div class="sidebar-right">
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;">Communities</div>
      <div id="profile-communities"></div>
    </div>

  </div>

  <script src="js/supabase.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
