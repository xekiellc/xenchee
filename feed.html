<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XenChee — Feed</title>
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="nav">
    <a href="/feed.html" class="nav-brand">XenChee</a>
    <div class="nav-actions">
      <a href="/profile.html" class="btn btn-ghost" id="profile-link">Profile</a>
      <button class="btn btn-ghost" id="logout-btn">Log Out</button>
    </div>
  </nav>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <div class="sidebar-left">
      <ul class="sidebar-nav">
        <li>
          <a href="/feed.html" class="active">
            <span class="sidebar-nav-icon">🏠</span>
            Home
          </a>
        </li>
        <li>
          <a href="/communities.html">
            <span class="sidebar-nav-icon">💬</span>
            Communities
          </a>
        </li>
        <li>
          <a href="/events.html">
            <span class="sidebar-nav-icon">📅</span>
            Events
          </a>
        </li>
        <li>
          <a href="/messages.html">
            <span class="sidebar-nav-icon">✉️</span>
            Messages
          </a>
        </li>
        <li>
          <a href="/notifications.html" style="position:relative;">
            <span class="sidebar-nav-icon">🔔</span>
            Notifications
            <span id="notif-badge" style="display:none;position:absolute;top:6px;right:12px;background:var(--primary);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:100px;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:18px;text-align:center;"></span>
          </a>
        </li>
        <li>
          <a href="/profile.html">
            <span class="sidebar-nav-icon">👤</span>
            Profile
          </a>
        </li>
        <li>
          <a href="/ecosystem.html">
            <span class="sidebar-nav-icon">🌐</span>
            Ecosystem
          </a>
        </li>
      </ul>

      <div style="margin-top:32px;padding:0 16px;">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">
          Communities
        </div>
        <div id="sidebar-communities"></div>
      </div>
    </div>

    <!-- Main Feed -->
    <div class="feed-main">

      <!-- Create Post -->
      <div class="create-post">
        <div class="create-post-header">
          <div class="post-avatar" id="current-user-avatar">?</div>
          <textarea
            class="create-post-input"
            id="post-content"
            placeholder="Say exactly what you mean..."
            maxlength="2000"
          ></textarea>
        </div>
        <div class="create-post-footer">
          <div class="create-post-tools">
            <button class="tool-btn" title="Add image">📷</button>
            <button class="tool-btn" id="poll-toggle-btn" title="Create poll">🗳️</button>
          </div>
          <button class="btn btn-primary" id="post-btn">Post</button>
        </div>

        <!-- Poll Creator -->
        <div id="poll-creator" style="display:none;margin-top:16px;border-top:1px solid var(--border);padding-top:16px;">
          <div class="form-group">
            <label class="form-label">Poll Question</label>
            <input type="text" id="poll-question" class="form-input" placeholder="Ask something..." maxlength="200" />
          </div>
          <div id="poll-options">
            <div class="form-group">
              <label class="form-label">Options</label>
              <input type="text" class="form-input poll-option" placeholder="Option 1" maxlength="100" style="margin-bottom:8px;" />
              <input type="text" class="form-input poll-option" placeholder="Option 2" maxlength="100" />
            </div>
          </div>
          <button class="btn btn-ghost" id="add-option-btn" style="font-size:13px;margin-top:8px;">+ Add Option</button>
          <div class="form-group" style="margin-top:12px;">
            <label class="form-label">Duration</label>
            <select id="poll-duration" class="form-input">
              <option value="1">1 hour</option>
              <option value="24" selected>1 day</option>
              <option value="72">3 days</option>
              <option value="168">7 days</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Feed Toggle -->
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button class="btn btn-primary" id="feed-all-btn" style="font-size:13px;">All Posts</button>
        <button class="btn btn-ghost" id="feed-following-btn" style="font-size:13px;">Following</button>
      </div>

      <!-- Posts Feed -->
      <div id="feed-container">
        <div class="loading">
          <div class="spinner"></div>
          Loading feed...
        </div>
      </div>

    </div>

    <!-- Right Sidebar -->
    <div class="sidebar-right">
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;">
        Trending Communities
      </div>
      <div id="trending-communities"></div>

      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-top:32px;margin-bottom:16px;">
        XenChee Ecosystem
      </div>
      <div id="ecosystem-sidebar"></div>
    </div>

  </div>

  <script src="js/supabase.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
