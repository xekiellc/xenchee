<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Voxxee</title>

  <meta property="og:title" content="Log In — Voxxee" />
  <meta property="og:description" content="Log in to your Voxxee account. Say exactly what you mean." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://voxxee.com/login.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Log In — Voxxee" />
  <meta name="twitter:description" content="Log in to your Voxxee account. Say exactly what you mean." />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voxxee" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FSCZJEWZ6F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FSCZJEWZ6F');
  </script>

  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-top: calc(var(--nav-height) + 32px);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 36px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--text-dim); padding: 0;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 24px 20px; border-radius: var(--radius-lg); }
      .auth-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/signup.html" class="btn btn-primary">Join Free</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-title">Welcome Back</div>
      <div class="auth-subtitle">Log in to your Voxxee account</div>

      <div id="alert-container"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="form-input" placeholder="Your password" style="padding-right:48px;" autocomplete="current-password" />
          <button id="password-toggle" type="button" class="password-toggle">👁️</button>
        </div>
      </div>

      <button id="login-btn" class="btn btn-primary btn-block" style="justify-content:center;padding:11px;">
        Log In
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Join free</a>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
