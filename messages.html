<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Voxxee</title>

  <meta property="og:title" content="Messages — Voxxee" />
  <meta property="og:description" content="Your private messages on Voxxee — the free speech maximalist social platform for verified adults." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://voxxee.com/messages.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Messages — Voxxee" />
  <meta name="twitter:description" content="Your private messages on Voxxee — the free speech maximalist social platform for verified adults." />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FSCZJEWZ6F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FSCZJEWZ6F');
  </script>

  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .messages-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: calc(var(--nav-height) + 24px) 16px 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .messages-layout {
      display: flex;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }
    .conversations-panel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .conversations-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .conversations-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .thread-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-width: 0;
    }
    .thread-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .thread-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .thread-compose {
      padding: 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .thread-compose-inner {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    /* Mobile */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(8,8,10,0.97);
      border-top: 1px solid var(--border);
      z-index: 1000;
      backdrop-filter: blur(12px);
    }
    .mobile-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 100%;
    }
    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      text-decoration: none;
      color: #6a6a7a;
      font-size: 10px;
      font-weight: 600;
    }
    .mobile-nav-item.active { color: var(--primary); }
    .mobile-nav-item span { font-size: 20px; line-height: 1; }

    @media (max-width: 768px) {
      .mobile-nav { display: block; }
      .messages-wrap { padding-bottom: 72px; }
      .conversations-panel { width: 100%; }
      .thread-panel { display: none; }
      .messages-layout { flex-direction: column; }
      .messages-layout.thread-open .conversations-panel { display: none; }
      .messages-layout.thread-open .thread-panel { display: flex; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/feed.html" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/feed.html" class="btn btn-ghost">Feed</a>
      <a href="/stories.html" class="btn btn-ghost">📸 Stories</a>
      <a href="/profile.html" class="btn btn-ghost">Profile</a>
      <button id="logout-btn" class="btn btn-ghost">Log Out</button>
    </div>
  </nav>

  <div class="messages-wrap">
    <div class="messages-layout" id="messages-layout">

      <!-- Conversations List -->
      <div class="conversations-panel">
        <div class="conversations-header">
          <div class="conversations-title">Messages</div>
          <button id="new-message-btn" class="btn btn-primary btn-sm">+ New</button>
        </div>
        <div id="conversations-list" style="flex:1;overflow-y:auto;padding:8px;">
          <div class="loading"><div class="spinner"></div>Loading...</div>
        </div>
      </div>

      <!-- Message Thread -->
      <div class="thread-panel">
        <div class="thread-header" id="thread-header">
          <div style="color:var(--text-muted);font-size:14px;">Select a conversation</div>
        </div>
        <div class="thread-messages" id="thread-messages"></div>
        <div class="thread-compose" id="thread-compose" style="display:none;">
          <div class="thread-compose-inner">
            <textarea id="message-input" class="form-input" rows="2" placeholder="Write a message..." maxlength="2000" style="flex:1;resize:none;"></textarea>
            <button id="send-btn" class="btn btn-primary" style="height:42px;padding:0 20px;">Send</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- New Message Modal -->
  <div id="new-message-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:400px;">
      <div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;">New Message</div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="new-message-username" class="form-input" placeholder="@username" autocomplete="off" />
        <div id="username-error" style="color:var(--danger);font-size:13px;margin-top:6px;display:none;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea id="new-message-content" class="form-textarea" rows="3" placeholder="Write a message..." maxlength="2000"></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button id="cancel-new-message-btn" class="btn btn-ghost">Cancel</button>
        <button id="send-new-message-btn" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a href="/feed.html" class="mobile-nav-item"><span>🏠</span>Home</a>
      <a href="/search.html" class="mobile-nav-item"><span>🔍</span>Search</a>
      <a href="/communities.html" class="mobile-nav-item"><span>💬</span>Communities</a>
      <a href="/notifications.html" class="mobile-nav-item"><span>🔔</span>Alerts</a>
      <a href="/profile.html" class="mobile-nav-item"><span>👤</span>Profile</a>
    </div>
  </nav>

  <script src="/js/supabase.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
