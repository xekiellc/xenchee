<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Voxxee</title>

  <!-- OG Meta Tags -->
  <meta property="og:title" content="Messages — Voxxee" />
  <meta property="og:description" content="Your private messages on Voxxee — the free speech maximalist social platform for verified adults." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://voxxee.com/messages.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Messages — Voxxee" />
  <meta name="twitter:description" content="Your private messages on Voxxee — the free speech maximalist social platform for verified adults." />

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FSCZJEWZ6F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FSCZJEWZ6F');
  </script>

  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <nav class="navbar">
    <a href="/feed.html" class="nav-brand">Voxxee</a>
    <div class="nav-actions">
      <a href="/feed.html" class="btn btn-ghost">Feed</a>
      <a href="/profile.html" class="btn btn-ghost">Profile</a>
      <button id="logout-btn" class="btn btn-ghost">Log Out</button>
    </div>
  </nav>

  <div class="container" style="max-width:900px;margin:0 auto;padding:24px 16px;">

    <div style="display:flex;gap:24px;height:calc(100vh - 120px);">

      <!-- Conversations List -->
      <div style="width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:16px;font-weight:700;color:var(--text);">Messages</div>
          <button id="new-message-btn" class="btn btn-primary" style="font-size:12px;padding:6px 12px;">+ New</button>
        </div>
        <div id="conversations-list" style="flex:1;overflow-y:auto;padding:8px;">
          <div class="loading"><div class="spinner"></div>Loading...</div>
        </div>
      </div>

      <!-- Message Thread -->
      <div style="flex:1;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;">

        <!-- Thread Header -->
        <div id="thread-header" style="padding:16px;border-bottom:1px solid var(--border);min-height:57px;">
          <div style="color:var(--text-muted);font-size:14px;">Select a conversation</div>
        </div>

        <!-- Messages -->
        <div id="thread-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;">
        </div>

        <!-- Compose -->
        <div id="thread-compose" style="display:none;padding:16px;border-top:1px solid var(--border);">
          <div style="display:flex;gap:8px;align-items:flex-end;">
            <textarea id="message-input" class="form-input" rows="2" placeholder="Write a message..." maxlength="2000" style="flex:1;resize:none;"></textarea>
            <button id="send-btn" class="btn btn-primary" style="height:42px;padding:0 20px;">Send</button>
          </div>
        </div>

      </div>
    </div>

    <!-- New Message Modal -->
    <div id="new-message-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;margin:0 16px;">
        <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;">New Message</div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="new-message-username" class="form-input" placeholder="@username" autocomplete="off" />
          <div id="username-error" style="color:var(--danger);font-size:13px;margin-top:6px;display:none;"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea id="new-message-content" class="form-input" rows="3" placeholder="Write a message..." maxlength="2000"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <button id="cancel-new-message-btn" class="btn btn-ghost">Cancel</button>
          <button id="send-new-message-btn" class="btn btn-primary">Send</button>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/supabase.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
